<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Judol Detector Rescan Test</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        line-height: 1.6;
        margin: 40px;
        max-width: 820px;
      }

      button {
        cursor: pointer;
        padding: 8px 12px;
      }
    </style>
  </head>
  <body>
    <h1>Rescan Test</h1>
    <p id="target">Paragraf awal aman dan belum memuat keyword target.</p>
    <button id="addText" type="button">Add Test Text</button>

    <script>
      document.getElementById("addText").addEventListener("click", () => {
        document.getElementById("target").textContent =
          "Konten berubah dan sekarang memuat slot gacor, jackpot maxwin, serta SLOT99.";
      });
    </script>
  </body>
</html>
